{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="breadcrumb-section set-bg" data-setbg="{% static 'img/blog/details/details-pic.jpg' %}">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <div class="breadcrumb__text">
                    <h2>My Profile</h2>
                    <div class="breadcrumb__option">
                        <a href="{% url 'products:home' %}">Home</a>
                        <span>Profile</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="checkout spad">
    <div class="container">
        <div class="row">
            <div class="col-lg-4 col-md-5">
                <div class="checkout__order text-center">
                    {% if profile.avatar %}
                    <img src="{{ profile.avatar.url }}" alt="{{ request.user.username }}" class="img-fluid rounded-circle mb-3" style="width: 160px; height: 160px; object-fit: cover;">
                    {% else %}
                    <img src="{% static 'img/blog/details/details-author.jpg' %}" alt="{{ request.user.username }}" class="img-fluid rounded-circle mb-3" style="width: 160px; height: 160px; object-fit: cover;">
                    {% endif %}
                    <h4>{{ request.user.username }}</h4>
                    <p class="mb-0">{{ request.user.email|default:'No email added yet.' }}</p>
                </div>
            </div>
            <div class="col-lg-8 col-md-7">
                <h4>Profile Details</h4>
                <form method="post" enctype="multipart/form-data" class="checkout__form">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-lg-6 mb-3">
                            <input type="text" name="first_name" class="form-control" placeholder="First name" value="{{ request.user.first_name }}">
                        </div>
                        <div class="col-lg-6 mb-3">
                            <input type="text" name="last_name" class="form-control" placeholder="Last name" value="{{ request.user.last_name }}">
                        </div>
                        <div class="col-lg-12 mb-3">
                            <input type="email" name="email" class="form-control" placeholder="Email address" value="{{ request.user.email }}">
                        </div>
                        <div class="col-lg-12 mb-3">
                            <input type="file" name="avatar" class="form-control">
                        </div>
                        <div class="col-lg-12 mb-3">
                            <textarea name="bio" class="form-control" rows="5" placeholder="Short bio">{{ profile.bio }}</textarea>
                        </div>
                    </div>
                    <button type="submit" class="site-btn">SAVE PROFILE</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
